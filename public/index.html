<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium priority-based To-Do List application built with jQuery and Node.js.">
    <title>My Task organizer | Simple & Effective</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="glass-card p-4 mb-4">
                    <h1 class="text-center mb-4 main-title">My Task organizer</h1>

                    <!-- Task Input Form -->
                    <form id="todo-form" class="row g-3 mb-4">
                        <div class="col-md-7">
                            <label for="task-input" class="visually-hidden">Task Description</label>
                            <input type="text" id="task-input" class="form-control custom-input"
                                placeholder="What needs to be done?" required aria-label="Task description">
                        </div>
                        <div class="col-md-3">
                            <label for="priority-input" class="visually-hidden">Priority</label>
                            <select id="priority-input" class="form-select custom-input" aria-label="Select priority">
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100 glow-button"
                                aria-label="Add task">Add</button>
                        </div>
                    </form>

                    <!-- Filters -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="btn-group filter-group" role="group">
                            <button type="button" class="btn btn-outline-light active filter-btn"
                                data-filter="all">All</button>
                            <button type="button" class="btn btn-outline-light filter-btn"
                                data-filter="pending">Pending</button>
                            <button type="button" class="btn btn-outline-light filter-btn"
                                data-filter="completed">Completed</button>
                        </div>
                        <div class="text-light opacity-75">
                            <span id="task-count">0</span> tasks left
                        </div>
                    </div>

                    <!-- Task List -->
                    <ul id="task-list" class="list-group list-group-flush">
                        <!-- Tasks will be injected here -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery and Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>

</html>
